name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: shellcheck install.sh
      - run: sudo apt-get update && sudo apt-get install -y bats
      - run: bats test/install.bats

  # The real thing, extracted to integration.yml so release.yml can run the
  # SAME suite as the tag gate (issue #32): install -> wire -> assert via the
  # apps' APIs -> idempotent re-run -> update -> uninstall/purge scoping.
  integration:
    uses: ./.github/workflows/integration.yml

  # install.sh against the real userland of every Tier-1 distro (issue #32).
  # Container-based where honest: tier detection reads the image's actual
  # os-release, and the full bootstrap downloads the LIVE latest release and
  # verifies its checksum (docker stubbed present -- engine installation
  # inside a container would prove nothing about a real host). The headless
  # guard is exercised for real: no tty in here.
  install-matrix:
    strategy:
      fail-fast: false
      matrix:
        image: ["debian:12", "debian:13", "ubuntu:22.04", "ubuntu:24.04"]
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v5
      - name: what a fresh minimal box has (curl, sudo, certs)
        run: apt-get update -q && apt-get install -y -q curl ca-certificates sudo >/dev/null
      - name: this distro classifies as tier 1
        run: |
          tier=$(bash -c "ARRSENAL_SOURCED=1 source ./install.sh; distro_tier")
          echo "$(. /etc/os-release && echo "$ID $VERSION_ID") -> $tier"
          [ "$tier" = "tier1" ]
      - name: headless run without consent dies BEFORE touching anything
        run: |
          set +e
          out=$(bash install.sh 2>&1); code=$?
          set -e
          [ "$code" -ne 0 ] || (echo "headless default-yes must not proceed" && exit 1)
          echo "$out" | grep -q "ARRSENAL_YES=1" || (echo "error must point at ARRSENAL_YES: $out" && exit 1)
          command -v docker && (echo "it installed docker without consent!" && exit 1) || true
      - name: full bootstrap against the live latest release
        run: |
          # Docker stubbed present; the binary download, checksum verify, and
          # install are the real thing on this distro's userland.
          printf '#!/bin/sh\nexit 0\n' > /usr/local/bin/docker && chmod +x /usr/local/bin/docker
          ARRSENAL_YES=1 ARRSENAL_NO_EXEC=1 bash install.sh
          test -x /usr/local/bin/arrsenal
          /usr/local/bin/arrsenal --help >/dev/null
          echo "installed: $(/usr/local/bin/arrsenal --help 2>&1 | head -1)"

  # Proves the release pipeline on every PR without tagging anything:
  # a full snapshot build must produce both linux binaries + checksums.
  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --snapshot --clean
      - run: ls -l dist/ && cat dist/checksums.txt
