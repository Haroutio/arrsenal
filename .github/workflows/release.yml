name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # The tag gate (issue #32): the full integration suite runs against the
  # tagged commit before anything is built or published. A tag on a commit
  # that cannot install, wire, and cleanly uninstall a real stack fails here
  # and no release appears.
  integration:
    permissions:
      contents: read
    uses: ./.github/workflows/integration.yml

  goreleaser:
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
