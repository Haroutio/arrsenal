version: 2

project_name: arrsenal

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/arrsenal
    binary: arrsenal
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# install.sh verifies downloads against this file (DESIGN.md §2, §9).
checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"

release:
  prerelease: auto
